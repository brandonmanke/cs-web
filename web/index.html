<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS-Web — aim_arena</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #090c0a; }
      body { font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; color: #d6d2bc; }
      canvas { width: 100%; height: 100%; display: block; outline: none; }
      #status { position: fixed; top: 14px; left: 16px; color: #f0a44c; letter-spacing: 1px; pointer-events: none; }
      #controls { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); opacity: 0.72; pointer-events: none; }
      .ready { color: #54dc78 !important; }
      .failed { color: #ff665c !important; }
    </style>
  </head>
  <body>
    <canvas id="canvas" tabindex="0"></canvas>
    <div id="status">LOADING C++ / WASM</div>
    <div id="controls">CLICK TO CAPTURE — WASD MOVE — SPACE JUMP — CTRL/C DUCK — ESC RELEASE</div>
    <script>
      var Module = {
        canvas: document.getElementById("canvas"),
        onRuntimeInitialized() {
          const status = document.getElementById("status");
          status.textContent = "M2 AIM_ARENA — C++ / 64 HZ";
          status.className = "ready";
          Module.canvas.focus();
        },
        printErr(message) {
          console.error(message);
          const status = document.getElementById("status");
          status.textContent = "WASM ERROR — SEE CONSOLE";
          status.className = "failed";
        }
      };
    </script>
    <script async src="game.js"></script>
  </body>
</html>
