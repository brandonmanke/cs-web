<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cs-web</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c0a; }
      body { font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; color: #d6d2bc; }
      #app, canvas { width: 100%; height: 100%; display: block; }
      #hud { position: fixed; inset: 0; pointer-events: none; user-select: none; }
      #crosshair {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        color: #7ce07c; font-size: 15px; text-shadow: 0 0 2px #000;
      }
      #hitmarker {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        color: #ff5a4a; font-size: 22px; opacity: 0; text-shadow: 0 0 2px #000;
      }
      #hitmarker.show { opacity: 1; }
      #ammo { position: absolute; right: 24px; bottom: 18px; font-size: 22px; color: #e8e2c8; text-shadow: 0 0 3px #000; }
      #speed { position: absolute; left: 24px; bottom: 18px; color: #9ab89a; text-shadow: 0 0 3px #000; }
      #score { position: absolute; right: 24px; top: 16px; color: #c8b87c; text-align: right; text-shadow: 0 0 3px #000; }
      #status {
        position: absolute; left: 50%; top: 42%; transform: translate(-50%, -50%);
        color: #f0a44c; font-size: 15px; letter-spacing: 1px; text-align: center;
      }
      #status.hidden { display: none; }
      #help { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); opacity: 0.6; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="crosshair">+</div>
      <div id="hitmarker">&times;</div>
      <div id="ammo">--/--</div>
      <div id="speed">0 u/s</div>
      <div id="score"></div>
      <div id="status">LOADING</div>
      <div id="help">CLICK TO PLAY &mdash; WASD &middot; SPACE &middot; CTRL &middot; R &middot; 1-7 &middot; ?map=dust2</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
